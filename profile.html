<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="icon" sizes="32x32" href="icon/cropped-logonuevo-32x32.png">
    <link rel="icon" sizes="192x192" href="icon/cropped-logonuevo-192x192.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/profile.js" defer></script>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">
                <h1 id="logo"><span></span></h1>
            </a>
            <form>
                <input id="nombre">
                <button id="btn-buscar"></button>
            </form>
            <div class="icono-fondo">
                <img src="icon/userIcon.svg" alt="Icono de Usuario" id="icono">
            </div>

            <div class="solo-movil">
                <img src="icon/menuIcon.svg" alt="Icono Móvil">
            </div>
        </nav>

    </header>

    <section class="ficha-usuario">
        <div>
            <img id="foto-grande" src="" alt="" class="imagen-grande">
            <img id="foto-pequena" src="" alt="" class="imagen-pequeña">
        </div>
        <div class="margen">
            <h1 id="nombre-perfil"></h1>
            <p id="descripcion-perfil" class="letra-cursiva">
            </p>
            <ul id="lista">
                <li class="item-perfil"><span id="etiq-color"></span> <span id="val-color"></span></li>
                <li class="item-perfil"><span id="etiq-libro"></span> <span id="val-libro"></span></li>
                <li class="item-perfil"><span id="etiq-musica"></span> <span id="val-musica"></span></li>
                <li class="item-perfil"><span id="etiq-juego"></span> <span id="val-juego"></span></li>
                <li class="item-perfil"><span id="etiq-lenguaje" class="negrita"></span> <span id="val-lenguaje" class="negrita"></span></li>
            </ul>
            <p id="etiq-email">
            </p>
        </div>
    </section>

    <footer>
        <p id="footer"></p>
    </footer>

</body>

</html>
